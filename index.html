<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Study Board</title>
  <style>
    :root {
      --bg: #f3eadb;
      --paper: #fffaf1;
      --paper-strong: #fff6e6;
      --ink: #2f2a24;
      --muted: #7c7063;
      --line: #e2d4bf;
      --accent: #4f7f68;
      --accent-dark: #315d49;
      --rose: #b66a66;
      --sky: #577f99;
      --honey: #b7833b;
      --clay: #a56548;
      --shadow: 0 14px 36px rgba(66, 48, 27, 0.12);
      --small-shadow: 0 8px 20px rgba(66, 48, 27, 0.08);
      --radius: 8px;
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100svh;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background:
        linear-gradient(rgba(145, 118, 83, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(145, 118, 83, 0.04) 1px, transparent 1px),
        var(--bg);
      background-size: 32px 32px;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button,
    label,
    input[type="checkbox"] {
      touch-action: manipulation;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app-shell {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 20px clamp(14px, 3vw, 28px) 28px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 0 16px;
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      backdrop-filter: blur(14px);
    }

    .brand {
      min-width: 0;
    }

    .eyebrow {
      margin: 0 0 3px;
      color: var(--accent-dark);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .top-actions,
    .mobile-tabs,
    .button-row,
    .period-strip,
    .metric-grid,
    .field-line,
    .panel-title,
    .subject-head,
    .task-row,
    .date-row {
      display: flex;
      align-items: center;
    }

    .top-actions {
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .soft-button,
    .primary-button,
    .danger-button,
    .icon-button,
    .tab-button,
    .period-button,
    .file-button {
      min-height: 42px;
      border-radius: var(--radius);
      padding: 0 14px;
      color: var(--ink);
      background: #fff7ea;
      border: 1px solid var(--line);
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.8) inset;
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
      white-space: nowrap;
    }

    .soft-button:hover,
    .primary-button:hover,
    .danger-button:hover,
    .icon-button:hover,
    .tab-button:hover,
    .period-button:hover,
    .file-button:hover {
      transform: translateY(-1px);
    }

    .primary-button {
      color: #fffdf8;
      background: var(--accent);
      border-color: var(--accent);
      font-weight: 800;
    }

    .danger-button {
      color: #7c332a;
      background: #fff1ea;
      border-color: #e6b9aa;
    }

    .icon-button {
      min-width: 42px;
      padding: 0 10px;
      color: var(--muted);
      background: transparent;
      box-shadow: none;
    }

    .file-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .mobile-tabs {
      display: none;
      gap: 8px;
      padding: 4px;
      margin: 0 0 12px;
      background: rgba(255, 250, 241, 0.8);
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .tab-button {
      flex: 1;
      background: transparent;
      box-shadow: none;
      font-weight: 800;
    }

    .tab-button.is-active {
      color: #fffdf8;
      background: var(--accent);
      border-color: var(--accent);
    }

    .board {
      display: grid;
      grid-template-columns: minmax(0, 1.18fr) minmax(340px, 0.82fr);
      gap: 16px;
      align-items: start;
    }

    .panel {
      min-width: 0;
      padding: clamp(14px, 2.2vw, 20px);
      background: rgba(255, 250, 241, 0.92);
      border: 1px solid rgba(226, 212, 191, 0.92);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .today-panel {
      position: sticky;
      top: 96px;
      max-height: calc(100svh - 116px);
      overflow: auto;
    }

    .panel-head {
      display: grid;
      gap: 14px;
      margin-bottom: 16px;
    }

    .panel-title {
      justify-content: space-between;
      gap: 12px;
    }

    .panel-title h2 {
      font-size: clamp(21px, 2.4vw, 30px);
      letter-spacing: 0;
    }

    .quiet-text {
      color: var(--muted);
      font-size: 14px;
    }

    .metric-grid {
      gap: 10px;
      flex-wrap: wrap;
    }

    .metric-card {
      flex: 1 1 190px;
      min-width: 0;
      padding: 12px;
      background: var(--paper-strong);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--small-shadow);
    }

    .metric-card strong {
      display: block;
      margin-bottom: 8px;
      font-size: 15px;
    }

    .metric-meta {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .percent {
      color: var(--ink);
      font-size: 28px;
      font-weight: 900;
      line-height: 1;
    }

    .progress-track {
      position: relative;
      height: 9px;
      margin-top: 10px;
      overflow: hidden;
      background: #ecdec9;
      border-radius: 999px;
    }

    .progress-fill {
      position: absolute;
      inset: 0 auto 0 0;
      width: var(--value, 0%);
      background: var(--accent);
      border-radius: inherit;
    }

    .new-line-form {
      display: grid;
      grid-template-columns: minmax(120px, 1fr) minmax(110px, 0.65fr) auto;
      gap: 8px;
      align-items: center;
    }

    .mini-form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      margin-top: 12px;
    }

    .input,
    .textarea {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px 12px;
      color: var(--ink);
      background: #fffdf8;
      outline: none;
      font-size: 16px;
    }

    .textarea {
      display: block;
      min-height: 38px;
      max-height: 150px;
      overflow: hidden;
      resize: none;
      line-height: 1.35;
    }

    .input:focus,
    .textarea:focus {
      border-color: color-mix(in srgb, var(--accent) 64%, var(--line));
      box-shadow: 0 0 0 3px rgba(79, 127, 104, 0.14);
    }

    .period-strip {
      gap: 8px;
      padding: 2px 0 8px;
      margin: 4px 0 12px;
      overflow-x: auto;
      scrollbar-width: thin;
    }

    .period-button {
      min-width: 154px;
      padding: 10px 12px;
      text-align: left;
      background: #fffaf1;
    }

    .period-button.is-active {
      color: #fffdf8;
      background: var(--accent-dark);
      border-color: var(--accent-dark);
    }

    .period-button b,
    .period-button span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .period-button span {
      margin-top: 3px;
      color: currentColor;
      opacity: 0.76;
      font-size: 12px;
    }

    .period-editor {
      display: grid;
      grid-template-columns: minmax(140px, 0.8fr) minmax(180px, 1fr) auto;
      gap: 8px;
      align-items: end;
      padding: 12px;
      margin-bottom: 14px;
      background: rgba(255, 246, 230, 0.76);
      border: 1px dashed #d9c7ac;
      border-radius: var(--radius);
    }

    .field-label {
      display: block;
      margin: 0 0 5px 2px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .section-bar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(210px, 300px);
      gap: 12px;
      align-items: end;
      margin: 0 0 12px;
    }

    .section-bar h3 {
      font-size: 20px;
      letter-spacing: 0;
    }

    .subject-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .subject-card {
      min-width: 0;
      padding: 13px;
      background: #fffdf8;
      border: 1px solid var(--line);
      border-top: 4px solid var(--accent);
      border-radius: var(--radius);
      box-shadow: var(--small-shadow);
    }

    .subject-card.tone-rose {
      border-top-color: var(--rose);
    }

    .subject-card.tone-sky {
      border-top-color: var(--sky);
    }

    .subject-card.tone-honey {
      border-top-color: var(--honey);
    }

    .subject-card.tone-clay {
      border-top-color: var(--clay);
    }

    .subject-card.tone-sage {
      border-top-color: var(--accent);
    }

    .subject-head {
      gap: 8px;
      margin-bottom: 10px;
    }

    .subject-name {
      flex: 1;
      min-width: 0;
      border: 0;
      padding: 8px 6px;
      color: var(--ink);
      background: transparent;
      border-radius: var(--radius);
      font-size: 18px;
      font-weight: 900;
      outline: none;
    }

    .subject-name:focus {
      background: #fff7ea;
      box-shadow: 0 0 0 2px rgba(79, 127, 104, 0.14);
    }

    .subject-dot {
      width: 12px;
      height: 12px;
      flex: 0 0 12px;
      border-radius: 99px;
      background: var(--accent);
    }

    .tone-rose .subject-dot {
      background: var(--rose);
    }

    .tone-sky .subject-dot {
      background: var(--sky);
    }

    .tone-honey .subject-dot {
      background: var(--honey);
    }

    .tone-clay .subject-dot {
      background: var(--clay);
    }

    .task-list {
      display: grid;
      gap: 8px;
      padding: 0;
      margin: 12px 0 0;
      list-style: none;
    }

    .task-row {
      gap: 8px;
      min-width: 0;
      padding: 8px;
      background: #fff8ed;
      border: 1px solid #eadbc5;
      border-radius: var(--radius);
    }

    .task-row.is-done {
      opacity: 0.68;
    }

    .task-row.is-done .textarea {
      text-decoration: line-through;
      color: var(--muted);
    }

    .check-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      flex: 0 0 28px;
      cursor: pointer;
    }

    .check-wrap input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
    }

    .check-mark {
      width: 24px;
      height: 24px;
      border: 2px solid #c6b8a4;
      border-radius: 7px;
      background: #fffdf8;
    }

    .check-wrap input:checked + .check-mark {
      background: var(--accent);
      border-color: var(--accent);
    }

    .check-wrap input:checked + .check-mark::after {
      content: "";
      position: absolute;
      top: 7px;
      left: 9px;
      width: 6px;
      height: 11px;
      border: solid #fff;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .task-main {
      min-width: 0;
      flex: 1;
    }

    .task-source {
      display: inline-flex;
      max-width: 100%;
      margin-top: 5px;
      padding: 3px 7px;
      color: #5f4e3a;
      background: #efe0c8;
      border-radius: 999px;
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .task-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 0 0 auto;
    }

    .copy-button {
      min-height: 36px;
      padding: 0 10px;
      color: var(--accent-dark);
      background: #edf5ef;
      border: 1px solid #c9ddcf;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .date-row {
      gap: 8px;
      flex-wrap: wrap;
      justify-content: space-between;
      margin: 12px 0;
    }

    .date-row .input {
      width: auto;
      min-width: 176px;
    }

    .daily-list {
      display: grid;
      gap: 9px;
      padding: 0;
      margin: 14px 0 0;
      list-style: none;
    }

    .daily-list .task-row {
      background: #fffdf8;
    }

    .empty-state {
      padding: 18px;
      color: var(--muted);
      background: rgba(255, 250, 241, 0.74);
      border: 1px dashed #d9c7ac;
      border-radius: var(--radius);
      text-align: center;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 40;
      max-width: min(340px, calc(100vw - 36px));
      padding: 12px 14px;
      color: #fffdf8;
      background: rgba(47, 42, 36, 0.92);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .toast.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 1180px) {
      .subject-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 860px) {
      .app-shell {
        padding-top: 12px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .top-actions {
        width: 100%;
        justify-content: stretch;
      }

      .top-actions > * {
        flex: 1;
      }

      .mobile-tabs {
        display: flex;
        position: sticky;
        top: 94px;
        z-index: 18;
      }

      .board {
        display: block;
      }

      .panel {
        display: none;
      }

      .board[data-view="macro"] .macro-panel,
      .board[data-view="today"] .today-panel {
        display: block;
      }

      .today-panel {
        position: static;
        max-height: none;
      }

      .new-line-form,
      .period-editor,
      .section-bar {
        grid-template-columns: 1fr;
      }

      .subject-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      .task-row {
        align-items: flex-start;
      }

      .task-actions {
        flex-direction: column;
        align-items: stretch;
      }

      .copy-button,
      .task-actions .icon-button {
        width: 100%;
      }

      .metric-card {
        flex-basis: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <p class="eyebrow">Study Board</p>
        <h1>공부 계획판</h1>
      </div>
      <div class="top-actions">
        <button class="soft-button" type="button" data-action="export">백업</button>
        <label class="file-button" for="restoreInput">복원</label>
        <input class="sr-only" id="restoreInput" type="file" accept="application/json" data-action="restore">
      </div>
    </header>

    <nav class="mobile-tabs" aria-label="화면 전환">
      <button class="tab-button" type="button" data-action="select-view" data-view="macro">큰 계획</button>
      <button class="tab-button" type="button" data-action="select-view" data-view="today">오늘 계획</button>
    </nav>

    <main class="board" id="board" data-view="macro">
      <section class="panel macro-panel" id="macroPanel" aria-label="큰 계획"></section>
      <aside class="panel today-panel" id="todayPanel" aria-label="오늘 계획"></aside>
    </main>
  </div>

  <div class="toast" id="toast" aria-live="polite"></div>

  <script>
    (() => {
      "use strict";

      const STORAGE_KEY = "study-board-safari-v1";
      const TONES = ["sage", "rose", "sky", "honey", "clay"];
      const macroPanel = document.querySelector("#macroPanel");
      const todayPanel = document.querySelector("#todayPanel");
      const board = document.querySelector("#board");
      const toast = document.querySelector("#toast");
      let toastTimer = 0;
      let state = loadState();

      function createId(prefix) {
        return `${prefix}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;
      }

      function getTodayISO(date = new Date()) {
        const localDate = new Date(date.getTime() - date.getTimezoneOffset() * 60000);
        return localDate.toISOString().slice(0, 10);
      }

      function makeTask(text, done = false, source = null) {
        return {
          id: createId("task"),
          text,
          done,
          source,
          createdAt: Date.now()
        };
      }

      function createDefaultState() {
        const today = getTodayISO();
        const july = {
          id: createId("period"),
          title: "7월 계획",
          note: "기본기와 약점 정리",
          subjects: [
            {
              id: createId("subject"),
              name: "국어",
              tone: "rose",
              tasks: [
                makeTask("문학 기출 20지문 복습"),
                makeTask("비문학 오답 선지 정리")
              ]
            },
            {
              id: createId("subject"),
              name: "수학",
              tone: "sage",
              tasks: [
                makeTask("수열 유형 30문제"),
                makeTask("미적분 약점 노트 보완")
              ]
            },
            {
              id: createId("subject"),
              name: "영어",
              tone: "sky",
              tasks: [
                makeTask("빈칸 추론 2회분"),
                makeTask("단어장 누적 복습")
              ]
            }
          ]
        };
        const exam = {
          id: createId("period"),
          title: "9평 전 계획",
          note: "실전 감각 만들기",
          subjects: [
            {
              id: createId("subject"),
              name: "탐구",
              tone: "honey",
              tasks: [
                makeTask("개념 빈칸 점검"),
                makeTask("실전 모의고사 3회")
              ]
            }
          ]
        };

        return {
          version: 1,
          selectedView: "macro",
          selectedDate: today,
          selectedPeriodId: july.id,
          periods: [july, exam],
          dailyPlans: {
            [today]: {
              tasks: [
                makeTask("오전 영어 단어 40개"),
                makeTask("저녁 오답노트 정리")
              ]
            }
          }
        };
      }

      function loadState() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          return createDefaultState();
        }
        try {
          return normalizeState(JSON.parse(raw));
        } catch (error) {
          console.warn("Study Board data reset:", error);
          return createDefaultState();
        }
      }

      function normalizeState(data) {
        const normalized = {
          version: 1,
          selectedView: data && data.selectedView === "today" ? "today" : "macro",
          selectedDate: isDateValue(data && data.selectedDate) ? data.selectedDate : getTodayISO(),
          selectedPeriodId: typeof (data && data.selectedPeriodId) === "string" ? data.selectedPeriodId : null,
          periods: Array.isArray(data && data.periods) ? data.periods.map(normalizePeriod).filter(Boolean) : [],
          dailyPlans: normalizeDailyPlans(data && data.dailyPlans)
        };

        if (!normalized.periods.some((period) => period.id === normalized.selectedPeriodId)) {
          normalized.selectedPeriodId = normalized.periods[0] ? normalized.periods[0].id : null;
        }
        if (!normalized.dailyPlans[normalized.selectedDate]) {
          normalized.dailyPlans[normalized.selectedDate] = { tasks: [] };
        }
        return normalized;
      }

      function normalizePeriod(period) {
        if (!period || typeof period !== "object") return null;
        return {
          id: typeof period.id === "string" ? period.id : createId("period"),
          title: cleanText(period.title) || "새 기간",
          note: cleanText(period.note),
          subjects: Array.isArray(period.subjects) ? period.subjects.map(normalizeSubject).filter(Boolean) : []
        };
      }

      function normalizeSubject(subject) {
        if (!subject || typeof subject !== "object") return null;
        const tone = TONES.includes(subject.tone) ? subject.tone : "sage";
        return {
          id: typeof subject.id === "string" ? subject.id : createId("subject"),
          name: cleanText(subject.name) || "새 과목",
          tone,
          tasks: Array.isArray(subject.tasks) ? subject.tasks.map(normalizeTask).filter(Boolean) : []
        };
      }

      function normalizeTask(task) {
        if (!task || typeof task !== "object") return null;
        return {
          id: typeof task.id === "string" ? task.id : createId("task"),
          text: cleanText(task.text) || "새 할 일",
          done: Boolean(task.done),
          source: normalizeSource(task.source),
          createdAt: Number.isFinite(task.createdAt) ? task.createdAt : Date.now()
        };
      }

      function normalizeSource(source) {
        if (!source || typeof source !== "object") return null;
        return {
          periodId: typeof source.periodId === "string" ? source.periodId : "",
          periodTitle: cleanText(source.periodTitle),
          subjectId: typeof source.subjectId === "string" ? source.subjectId : "",
          subjectName: cleanText(source.subjectName),
          taskId: typeof source.taskId === "string" ? source.taskId : ""
        };
      }

      function normalizeDailyPlans(dailyPlans) {
        const result = {};
        if (!dailyPlans || typeof dailyPlans !== "object") {
          return result;
        }
        Object.entries(dailyPlans).forEach(([date, plan]) => {
          if (!isDateValue(date)) return;
          result[date] = {
            tasks: Array.isArray(plan && plan.tasks) ? plan.tasks.map(normalizeTask).filter(Boolean) : []
          };
        });
        return result;
      }

      function cleanText(value) {
        return typeof value === "string" ? value.trim() : "";
      }

      function isDateValue(value) {
        return typeof value === "string" && /^\d{4}-\d{2}-\d{2}$/.test(value);
      }

      function saveState() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        } catch (error) {
          showToast("저장 공간을 확인해 주세요.");
          console.warn("Study Board save failed:", error);
        }
      }

      function getSelectedPeriod() {
        return state.periods.find((period) => period.id === state.selectedPeriodId) || null;
      }

      function getDailyPlan(date = state.selectedDate) {
        if (!state.dailyPlans[date]) {
          state.dailyPlans[date] = { tasks: [] };
        }
        return state.dailyPlans[date];
      }

      function countTasks(tasks) {
        const total = tasks.length;
        const done = tasks.filter((task) => task.done).length;
        return {
          done,
          total,
          percent: total ? Math.round((done / total) * 100) : 0
        };
      }

      function getSubjectProgress(subject) {
        return countTasks(subject.tasks);
      }

      function getPeriodProgress(period) {
        return countTasks(period ? period.subjects.flatMap((subject) => subject.tasks) : []);
      }

      function getGlobalProgress() {
        return countTasks(state.periods.flatMap((period) => period.subjects.flatMap((subject) => subject.tasks)));
      }

      function getDailyProgress(date = state.selectedDate) {
        return countTasks(getDailyPlan(date).tasks);
      }

      function render() {
        const selectedPeriod = getSelectedPeriod();
        board.dataset.view = state.selectedView;
        macroPanel.innerHTML = renderMacroPanel(selectedPeriod);
        todayPanel.innerHTML = renderTodayPanel();
        document.querySelectorAll("[data-action='select-view']").forEach((button) => {
          button.classList.toggle("is-active", button.dataset.view === state.selectedView);
        });
        autoSizeTextareas();
      }

      function renderMacroPanel(period) {
        const global = getGlobalProgress();
        const periodProgress = getPeriodProgress(period);
        return `
          <div class="panel-head">
            <div class="panel-title">
              <div>
                <h2>큰 계획</h2>
                <p class="quiet-text">기간별 목표와 과목별 할 일을 나눠 봅니다.</p>
              </div>
            </div>
            <div class="metric-grid">
              ${renderMetric("전체 진행률", global)}
              ${renderMetric(period ? `${escapeHtml(period.title)} 진행률` : "기간 진행률", periodProgress)}
            </div>
            <form class="new-line-form" data-form="period">
              <label>
                <span class="sr-only">새 기간 이름</span>
                <input class="input" name="periodTitle" type="text" autocomplete="off" placeholder="새 기간 이름">
              </label>
              <label>
                <span class="sr-only">기간 메모</span>
                <input class="input" name="periodNote" type="text" autocomplete="off" placeholder="메모">
              </label>
              <button class="primary-button" type="submit">기간 추가</button>
            </form>
          </div>
          ${renderPeriodStrip()}
          ${period ? renderPeriodWorkspace(period) : renderEmpty("기간이 비어 있어요.")}
        `;
      }

      function renderMetric(label, progress) {
        return `
          <div class="metric-card">
            <strong>${label}</strong>
            <div class="metric-meta">
              <span class="percent">${progress.percent}%</span>
              <span>${progress.done}/${progress.total} 완료</span>
            </div>
            <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="${progress.percent}">
              <span class="progress-fill" style="--value:${progress.percent}%"></span>
            </div>
          </div>
        `;
      }

      function renderPeriodStrip() {
        if (!state.periods.length) {
          return "";
        }
        return `
          <div class="period-strip" aria-label="기간 목록">
            ${state.periods.map((period) => {
              const progress = getPeriodProgress(period);
              return `
                <button class="period-button ${period.id === state.selectedPeriodId ? "is-active" : ""}" type="button" data-action="select-period" data-period-id="${period.id}">
                  <b>${escapeHtml(period.title)}</b>
                  <span>${progress.percent}% · ${progress.done}/${progress.total}</span>
                </button>
              `;
            }).join("")}
          </div>
        `;
      }

      function renderPeriodWorkspace(period) {
        return `
          <div class="period-editor">
            <label>
              <span class="field-label">기간 이름</span>
              <input class="input" type="text" value="${escapeAttribute(period.title)}" data-edit="period-title" data-period-id="${period.id}">
            </label>
            <label>
              <span class="field-label">메모</span>
              <input class="input" type="text" value="${escapeAttribute(period.note)}" data-edit="period-note" data-period-id="${period.id}">
            </label>
            <button class="danger-button" type="button" data-action="delete-period" data-period-id="${period.id}">기간 삭제</button>
          </div>
          <div class="section-bar">
            <div>
              <h3>과목별 카드</h3>
              <p class="quiet-text">${period.subjects.length}개 과목</p>
            </div>
            <form class="mini-form" data-form="subject">
              <label>
                <span class="sr-only">새 과목 이름</span>
                <input class="input" name="subjectName" type="text" autocomplete="off" placeholder="새 과목">
              </label>
              <button class="primary-button" type="submit">추가</button>
            </form>
          </div>
          ${period.subjects.length ? `
            <div class="subject-grid">
              ${period.subjects.map((subject) => renderSubjectCard(subject)).join("")}
            </div>
          ` : renderEmpty("과목 카드가 비어 있어요.")}
        `;
      }

      function renderSubjectCard(subject) {
        const progress = getSubjectProgress(subject);
        return `
          <article class="subject-card tone-${subject.tone}">
            <header class="subject-head">
              <span class="subject-dot" aria-hidden="true"></span>
              <input class="subject-name" type="text" value="${escapeAttribute(subject.name)}" data-edit="subject-name" data-subject-id="${subject.id}" aria-label="과목 이름">
              <button class="icon-button" type="button" data-action="delete-subject" data-subject-id="${subject.id}" aria-label="과목 삭제">삭제</button>
            </header>
            <div class="metric-meta">
              <span>${progress.done}/${progress.total} 완료</span>
              <span>${progress.percent}%</span>
            </div>
            <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="${progress.percent}">
              <span class="progress-fill" style="--value:${progress.percent}%"></span>
            </div>
            ${subject.tasks.length ? `
              <ul class="task-list">
                ${subject.tasks.map((task) => renderMacroTask(task)).join("")}
              </ul>
            ` : renderEmpty("할 일이 비어 있어요.")}
            <form class="mini-form" data-form="macro-task" data-subject-id="${subject.id}">
              <label>
                <span class="sr-only">큰 계획 할 일</span>
                <input class="input" name="taskText" type="text" autocomplete="off" placeholder="할 일 추가">
              </label>
              <button class="primary-button" type="submit">추가</button>
            </form>
          </article>
        `;
      }

      function renderMacroTask(task) {
        return `
          <li class="task-row ${task.done ? "is-done" : ""}">
            <label class="check-wrap" aria-label="완료 여부">
              <input type="checkbox" data-action="toggle-macro-task" data-task-id="${task.id}" ${task.done ? "checked" : ""}>
              <span class="check-mark"></span>
            </label>
            <div class="task-main">
              <textarea class="textarea" rows="1" data-edit="macro-task-text" data-task-id="${task.id}" aria-label="큰 계획 할 일">${escapeHtml(task.text)}</textarea>
            </div>
            <div class="task-actions">
              <button class="copy-button" type="button" data-action="copy-today" data-task-id="${task.id}">오늘 하기</button>
              <button class="icon-button" type="button" data-action="delete-macro-task" data-task-id="${task.id}" aria-label="할 일 삭제">삭제</button>
            </div>
          </li>
        `;
      }

      function renderTodayPanel() {
        const progress = getDailyProgress();
        const plan = getDailyPlan();
        return `
          <div class="panel-head">
            <div class="panel-title">
              <div>
                <h2>오늘 계획</h2>
                <p class="quiet-text">${formatDateLabel(state.selectedDate)}</p>
              </div>
            </div>
            ${renderMetric("일별 진행률", progress)}
            <div class="date-row">
              <input class="input" type="date" value="${state.selectedDate}" data-action="date-change" aria-label="날짜 선택">
              <button class="soft-button" type="button" data-action="go-today">오늘</button>
            </div>
            <form class="mini-form" data-form="daily-task">
              <label>
                <span class="sr-only">일별 할 일</span>
                <input class="input" name="taskText" type="text" autocomplete="off" placeholder="오늘 할 일">
              </label>
              <button class="primary-button" type="submit">추가</button>
            </form>
          </div>
          ${plan.tasks.length ? `
            <ul class="daily-list">
              ${plan.tasks.map((task) => renderDailyTask(task)).join("")}
            </ul>
          ` : renderEmpty("오늘 계획이 비어 있어요.")}
        `;
      }

      function renderDailyTask(task) {
        const source = task.source && (task.source.periodTitle || task.source.subjectName)
          ? `<span class="task-source">${escapeHtml([task.source.periodTitle, task.source.subjectName].filter(Boolean).join(" · "))}</span>`
          : "";
        return `
          <li class="task-row ${task.done ? "is-done" : ""}">
            <label class="check-wrap" aria-label="완료 여부">
              <input type="checkbox" data-action="toggle-daily-task" data-task-id="${task.id}" ${task.done ? "checked" : ""}>
              <span class="check-mark"></span>
            </label>
            <div class="task-main">
              <textarea class="textarea" rows="1" data-edit="daily-task-text" data-task-id="${task.id}" aria-label="일별 할 일">${escapeHtml(task.text)}</textarea>
              ${source}
            </div>
            <div class="task-actions">
              <button class="icon-button" type="button" data-action="delete-daily-task" data-task-id="${task.id}" aria-label="할 일 삭제">삭제</button>
            </div>
          </li>
        `;
      }

      function renderEmpty(message) {
        return `<div class="empty-state">${message}</div>`;
      }

      function handleSubmit(event) {
        const form = event.target.closest("form[data-form]");
        if (!form) return;
        event.preventDefault();

        if (form.dataset.form === "period") {
          const title = cleanText(form.elements.periodTitle.value);
          if (!title) return showToast("기간 이름을 입력해 주세요.");
          const period = {
            id: createId("period"),
            title,
            note: cleanText(form.elements.periodNote.value),
            subjects: []
          };
          state.periods.push(period);
          state.selectedPeriodId = period.id;
          form.reset();
          saveAndRender("기간을 추가했어요.");
        }

        if (form.dataset.form === "subject") {
          const period = getSelectedPeriod();
          const name = cleanText(form.elements.subjectName.value);
          if (!period || !name) return showToast("과목 이름을 입력해 주세요.");
          period.subjects.push({
            id: createId("subject"),
            name,
            tone: TONES[period.subjects.length % TONES.length],
            tasks: []
          });
          form.reset();
          saveAndRender("과목을 추가했어요.");
        }

        if (form.dataset.form === "macro-task") {
          const subject = findSubject(form.dataset.subjectId);
          const text = cleanText(form.elements.taskText.value);
          if (!subject || !text) return showToast("할 일을 입력해 주세요.");
          subject.tasks.push(makeTask(text));
          form.reset();
          saveAndRender("큰 계획에 추가했어요.");
        }

        if (form.dataset.form === "daily-task") {
          const text = cleanText(form.elements.taskText.value);
          if (!text) return showToast("할 일을 입력해 주세요.");
          getDailyPlan().tasks.push(makeTask(text));
          form.reset();
          saveAndRender("일별 계획에 추가했어요.");
        }
      }

      function handleClick(event) {
        const actionTarget = event.target.closest("[data-action]");
        if (!actionTarget) return;
        const action = actionTarget.dataset.action;

        if (action === "select-view") {
          state.selectedView = actionTarget.dataset.view === "today" ? "today" : "macro";
          saveAndRender();
        }

        if (action === "select-period") {
          state.selectedPeriodId = actionTarget.dataset.periodId;
          saveAndRender();
        }

        if (action === "go-today") {
          state.selectedDate = getTodayISO();
          getDailyPlan();
          saveAndRender();
        }

        if (action === "copy-today") {
          copyMacroTaskToToday(actionTarget.dataset.taskId);
        }

        if (action === "delete-period") {
          deletePeriod(actionTarget.dataset.periodId);
        }

        if (action === "delete-subject") {
          deleteSubject(actionTarget.dataset.subjectId);
        }

        if (action === "delete-macro-task") {
          deleteMacroTask(actionTarget.dataset.taskId);
        }

        if (action === "delete-daily-task") {
          deleteDailyTask(actionTarget.dataset.taskId);
        }

        if (action === "export") {
          exportBackup();
        }
      }

      function handleChange(event) {
        const target = event.target;
        const action = target.dataset.action;

        if (action === "toggle-macro-task") {
          const found = findMacroTask(target.dataset.taskId);
          if (!found) return;
          found.task.done = target.checked;
          saveAndRender();
        }

        if (action === "toggle-daily-task") {
          const task = findDailyTask(target.dataset.taskId);
          if (!task) return;
          task.done = target.checked;
          saveAndRender();
        }

        if (action === "date-change") {
          state.selectedDate = isDateValue(target.value) ? target.value : getTodayISO();
          getDailyPlan();
          saveAndRender();
        }

        if (action === "restore") {
          restoreBackup(target.files && target.files[0]);
          target.value = "";
        }
      }

      function handleInput(event) {
        const target = event.target;
        const edit = target.dataset.edit;
        if (!edit) return;

        if (edit === "period-title" || edit === "period-note") {
          const period = state.periods.find((item) => item.id === target.dataset.periodId);
          if (!period) return;
          period[edit === "period-title" ? "title" : "note"] = cleanText(target.value);
        }

        if (edit === "subject-name") {
          const subject = findSubject(target.dataset.subjectId);
          if (!subject) return;
          subject.name = cleanText(target.value) || "새 과목";
        }

        if (edit === "macro-task-text") {
          const found = findMacroTask(target.dataset.taskId);
          if (!found) return;
          found.task.text = cleanText(target.value) || "새 할 일";
          autoSizeTextarea(target);
        }

        if (edit === "daily-task-text") {
          const task = findDailyTask(target.dataset.taskId);
          if (!task) return;
          task.text = cleanText(target.value) || "새 할 일";
          autoSizeTextarea(target);
        }

        saveState();
      }

      function handleBlur(event) {
        if (!event.target.dataset.edit) return;
        render();
      }

      function findSubject(subjectId) {
        for (const period of state.periods) {
          const subject = period.subjects.find((item) => item.id === subjectId);
          if (subject) return subject;
        }
        return null;
      }

      function findMacroTask(taskId) {
        for (const period of state.periods) {
          for (const subject of period.subjects) {
            const task = subject.tasks.find((item) => item.id === taskId);
            if (task) return { period, subject, task };
          }
        }
        return null;
      }

      function findDailyTask(taskId) {
        return getDailyPlan().tasks.find((task) => task.id === taskId) || null;
      }

      function copyMacroTaskToToday(taskId) {
        const found = findMacroTask(taskId);
        if (!found) return;
        const today = getTodayISO();
        state.selectedDate = today;
        getDailyPlan(today).tasks.push(makeTask(found.task.text, false, {
          periodId: found.period.id,
          periodTitle: found.period.title,
          subjectId: found.subject.id,
          subjectName: found.subject.name,
          taskId: found.task.id
        }));
        if (window.matchMedia("(max-width: 860px)").matches) {
          state.selectedView = "today";
        }
        saveAndRender("오늘 계획으로 복사했어요.");
      }

      function deletePeriod(periodId) {
        const period = state.periods.find((item) => item.id === periodId);
        if (!period) return;
        if (!confirm(`"${period.title}" 기간을 삭제할까요?`)) return;
        state.periods = state.periods.filter((item) => item.id !== periodId);
        state.selectedPeriodId = state.periods[0] ? state.periods[0].id : null;
        saveAndRender("기간을 삭제했어요.");
      }

      function deleteSubject(subjectId) {
        const period = getSelectedPeriod();
        if (!period) return;
        const subject = period.subjects.find((item) => item.id === subjectId);
        if (!subject) return;
        if (!confirm(`"${subject.name}" 과목을 삭제할까요?`)) return;
        period.subjects = period.subjects.filter((item) => item.id !== subjectId);
        saveAndRender("과목을 삭제했어요.");
      }

      function deleteMacroTask(taskId) {
        const found = findMacroTask(taskId);
        if (!found) return;
        found.subject.tasks = found.subject.tasks.filter((task) => task.id !== taskId);
        saveAndRender("큰 계획에서 삭제했어요.");
      }

      function deleteDailyTask(taskId) {
        const plan = getDailyPlan();
        plan.tasks = plan.tasks.filter((task) => task.id !== taskId);
        saveAndRender("일별 계획에서 삭제했어요.");
      }

      function exportBackup() {
        const payload = {
          ...state,
          exportedAt: new Date().toISOString()
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = url;
        anchor.download = `study-board-backup-${getTodayISO()}.json`;
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
        URL.revokeObjectURL(url);
        showToast("백업 파일을 만들었어요.");
      }

      function restoreBackup(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const imported = normalizeState(JSON.parse(String(reader.result || "{}")));
            if (!confirm("현재 계획을 복원 파일로 바꿀까요?")) return;
            state = imported;
            saveAndRender("복원했어요.");
          } catch (error) {
            showToast("복원 파일을 확인해 주세요.");
            console.warn("Study Board restore failed:", error);
          }
        };
        reader.readAsText(file);
      }

      function saveAndRender(message) {
        saveState();
        render();
        if (message) showToast(message);
      }

      function showToast(message) {
        window.clearTimeout(toastTimer);
        toast.textContent = message;
        toast.classList.add("is-visible");
        toastTimer = window.setTimeout(() => {
          toast.classList.remove("is-visible");
        }, 1800);
      }

      function formatDateLabel(value) {
        const [year, month, day] = value.split("-").map(Number);
        const date = new Date(year, month - 1, day);
        return new Intl.DateTimeFormat("ko-KR", {
          month: "long",
          day: "numeric",
          weekday: "long"
        }).format(date);
      }

      function autoSizeTextareas() {
        document.querySelectorAll("textarea").forEach(autoSizeTextarea);
      }

      function autoSizeTextarea(textarea) {
        textarea.style.height = "auto";
        textarea.style.height = `${textarea.scrollHeight}px`;
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function escapeAttribute(value) {
        return escapeHtml(value).replaceAll("`", "&#096;");
      }

      document.addEventListener("submit", handleSubmit);
      document.addEventListener("click", handleClick);
      document.addEventListener("change", handleChange);
      document.addEventListener("input", handleInput);
      document.addEventListener("blur", handleBlur, true);
      window.addEventListener("resize", autoSizeTextareas);

      render();
    })();
  </script>
</body>
</html>
